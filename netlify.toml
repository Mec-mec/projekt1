[build]
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from  = "/api/report"
  to    = "/.netlify/functions/report"
  status = 200
  force  = true

[[redirects]]
  from  = "/api/stats"
  to    = "/.netlify/functions/stats"
  status = 200
  force  = true
